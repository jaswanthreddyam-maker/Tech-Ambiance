project_id = "Tech_Ambiance"

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/*",
  "http://127.0.0.1:5173/*",
  "https://tech-ambiance.vercel.app/**",
  "https://tech-ambiance-*.vercel.app/**"
]

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.email.template.magic_link]
subject = "StudioHQ Executive Authentication OTP"
content_path = "./supabase/templates/magic_link.html"

[auth.email.smtp]
host = "smtp.gmail.com"
port = 465
user = "hello.techambiance@gmail.com"
pass = "env(SMTP_PASSWORD)"
admin_email = "hello.techambiance@gmail.com"
sender_name = "StudioHQ"

[functions.outbox-processor]
enabled = true
verify_jwt = false
import_map = "./functions/outbox-processor/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/outbox-processor/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/outbox-processor/*.html" ]

[functions.admin-auth]
enabled = true
verify_jwt = false
import_map = "./functions/admin-auth/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/admin-auth/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/admin-auth/*.html" ]
